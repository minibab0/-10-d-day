<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>다정고 1학년 실시간 디데이</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --btn-bg: #1a1a1a;
            --btn-border: #333333;
            --sub-text: #666666;
            --quote-color: #aaaaaa;
            --accent-color: #007bff;
            --modal-bg: #111111;
        }

        body.light-mode {
            --bg-color: #ffffff;
            --text-color: #000000;
            --btn-bg: #f0f0f0;
            --btn-border: #cccccc;
            --sub-text: #888888;
            --quote-color: #555555;
            --accent-color: #0056b3;
            --modal-bg: #f5f5f5;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        /* 분할 모드 스타일 */
        #exit-split-btn {
            display: none;
            position: fixed;
            top: 25px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            border: 1px solid var(--btn-border);
            padding: 12px 18px;
            border-radius: 12px;
            cursor: pointer;
            z-index: 1000;
            backdrop-filter: blur(8px);
            font-weight: 600;
        }

        body.split-active #exit-split-btn { display: block; }
        
        /* 분할 모드 시 모든 UI 숨기기 (요청하신 버튼 포함) */
        body.split-active .theme-toggle,
        body.split-active .add-btn,
        body.split-active .control-btns,
        body.split-active .info-text,
        body.split-active h1,
        body.split-active .pip-btn {
            display: none !important;
        }

        /* 분할 모드 시 글씨 크기 */
        body.split-active .timer { font-size: 3.2rem !important; letter-spacing: -1px; }
        body.split-active .label { font-size: 1.5rem !important; margin-bottom: 10px; }

        /* 기본 레이아웃 */
        .theme-toggle { position: fixed; top: 20px; left: 20px; background: var(--btn-bg); color: var(--text-color); border: 1px solid var(--btn-border); padding: 8px 15px; border-radius: 20px; cursor: pointer; z-index: 100; }
        .add-btn { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: var(--accent-color); color: white; border: none; border-radius: 50%; font-size: 35px; cursor: pointer; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        #main-screen { display: flex; flex-direction: column; align-items: center; width: 100%; }
        h1 { font-size: 3.5rem; margin: 0 0 10px 0; font-weight: 800; letter-spacing: -2px; }
        .info-text { color: var(--sub-text); font-size: 1.1rem; margin-bottom: 50px; }

        .button-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        button.nav-btn { background: var(--btn-bg); color: var(--text-color); border: 1px solid var(--btn-border); padding: 18px 35px; font-size: 1.2rem; border-radius: 18px; cursor: pointer; font-weight: 700; transition: 0.2s; }

        #result-screen { display: none; flex-direction: column; align-items: center; width: 100%; opacity: 0; transition: opacity 0.5s ease; }
        
        .timer { font-size: 5.5rem; font-weight: 900; letter-spacing: -2px; }
        .timer-unit { font-size: 0.4em; opacity: 0.8; margin-left: 8px; font-weight: 500; }
        .label { font-size: 2rem; margin-bottom: 20px; font-weight: 600; }

        .control-btns { display: flex; gap: 12px; margin-top: 30px; }
        .back-btn, .edit-btn, .del-btn { padding: 12px 25px; border-radius: 50px; cursor: pointer; border: 1.5px solid var(--btn-border); background: transparent; color: var(--sub-text); font-weight: 600; }
        
        .pip-btn { width: 220px; padding: 18px; border-radius: 50px; background: #ff9f43; color: white; border: none; font-weight: 800; font-size: 1.2rem; cursor: pointer; margin-top: 40px; box-shadow: 0 4px 12px rgba(255, 159, 67, 0.3); transition: 0.2s; }
        .pip-btn:active { transform: scale(0.95); }

        #modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        #custom-modal { background: var(--modal-bg); padding: 30px; border-radius: 25px; width: 320px; display: flex; flex-direction: column; gap: 18px; border: 1px solid var(--btn-border); }
    </style>
</head>
<body class="dark-mode">

    <button id="exit-split-btn" onclick="exitSplitMode()">← 돌아가기</button>

    <button class="theme-toggle" onclick="toggleTheme()">🌗 테마 전환</button>

    <div id="main-screen">
        <div id="quote-text" style="margin-bottom: 25px; color: var(--quote-color); font-style: italic; font-size: 1.1rem;"></div>
        <h1>D-Day Tracker</h1>
        <p class="info-text">다정고등학교 2026년도 1학년 기준</p>
        <div class="button-container" id="btn-wrapper"></div>
    </div>

    <button class="add-btn" onclick="openModal(-1)">+</button>

    <div id="result-screen">
        <div id="result-content"></div>
        <div class="control-btns" id="extra-controls"></div>
        
        <button class="pip-btn" onclick="enterSplitMode()">📺 분할모드 시작</button>
        
        <div class="control-btns" style="margin-top: 20px;">
            <button class="back-btn" onclick="stopTimer()">뒤로 가기</button>
        </div>
    </div>

    <div id="modal-bg">
        <div id="custom-modal">
            <h3 style="margin:0; text-align: center;">디데이 설정</h3>
            <input type="text" id="m-title" placeholder="제목을 입력하세요" style="padding:12px; border-radius:10px; border:1px solid #333; background:#000; color:#fff;">
            <input type="date" id="m-date" style="padding:12px; border-radius:10px; border:1px solid #333; background:#000; color:#fff;">
            <select id="m-color" onchange="this.style.color = this.value" style="padding:12px; border-radius:10px; border:1px solid #333; background:#000;">
                <option value="#ff4d4d" style="color:#ff4d4d">빨강</option>
                <option value="#ff9f43" style="color:#ff9f43">주황</option>
                <option value="#feca57" style="color:#feca57">노랑</option>
                <option value="#1dd1a1" style="color:#1dd1a1">초록</option>
                <option value="#54a0ff" style="color:#54a0ff">파랑</option>
                <option value="#ffffff" style="color:#888">흰색</option>
            </select>
            <button onclick="saveCustomDDay()" style="padding:15px; background:var(--accent-color); color:white; border:none; border-radius:12px; font-weight:700; cursor:pointer;">저장하기</button>
            <button onclick="closeModal()" style="padding:12px; background:#333; color:white; border:none; border-radius:12px; cursor:pointer;">취소</button>
        </div>
    </div>

    <script>
        const quotes = ["오늘 걷지 않으면 내일은 뛰어야 한다.", "할 수 있다고 믿는 사람은 결국 해낸다.", "내일의 나를 만드는 것은 오늘의 나다.", "노력은 결코 배신하지 않는다."];
        let timerInterval, editTargetIndex = -1;

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }

        function enterSplitMode() { document.body.classList.add('split-active'); }
        function exitSplitMode() { document.body.classList.remove('split-active'); }

        function openModal(index) {
            editTargetIndex = index;
            document.getElementById('modal-bg').style.display = 'flex';
            if (index !== -1) {
                const data = JSON.parse(localStorage.getItem('myDDays'))[index];
                document.getElementById('m-title').value = data.title;
                document.getElementById('m-date').value = data.date.split('T')[0];
                document.getElementById('m-color').value = data.color;
            }
        }

        function closeModal() { document.getElementById('modal-bg').style.display = 'none'; }

        function saveCustomDDay() {
            const title = document.getElementById('m-title').value;
            const date = document.getElementById('m-date').value;
            const color = document.getElementById('m-color').value;
            if (!title || !date) return alert("정보를 입력해주세요.");
            const data = JSON.parse(localStorage.getItem('myDDays') || '[]');
            if (editTargetIndex === -1) data.push({ title, date: date + "T00:00:00", color });
            else data[editTargetIndex] = { title, date: date + "T00:00:00", color };
            localStorage.setItem('myDDays', JSON.stringify(data));
            closeModal(); renderButtons();
        }

        function renderButtons() {
            const wrapper = document.getElementById('btn-wrapper');
            wrapper.innerHTML = `<button class="nav-btn" onclick="startTimer('exam')">시험</button><button class="nav-btn" onclick="startTimer('vacation')">방학</button>`;
            JSON.parse(localStorage.getItem('myDDays') || '[]').forEach((item, i) => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn'; btn.innerText = item.title; btn.style.color = item.color; btn.style.borderColor = item.color;
                btn.onclick = () => startTimer('custom', i);
                wrapper.appendChild(btn);
            });
        }

        function updateDisplay(type, index) {
            const resultContent = document.getElementById('result-content');
            const controlArea = document.getElementById('extra-controls');
            const now = new Date();
            let targets = (type === 'custom') ? [JSON.parse(localStorage.getItem('myDDays'))[index]] : {exam:[{label:'중간고사',date:'2026-04-23T00:00:00',color:'#ff5252'}],vacation:[{label:'여름방학',date:'2026-07-20T00:00:00',color:'#4dabf7'}]}[type];

            if(type === 'custom') controlArea.innerHTML = `<button class="edit-btn" onclick="openModal(${index})">수정</button><button class="del-btn" onclick="deleteDDay(${index})">삭제</button>`;
            else controlArea.innerHTML = "";

            let html = '';
            targets.forEach(item => {
                const diff = new Date(item.date) - now;
                const d = Math.floor(diff / 86400000), h = Math.floor((diff/3600000)%24), m = Math.floor((diff/60000)%60), s = Math.floor((diff/1000)%60);
                let dDayText = (d === 0 && diff > 0) ? "D-Day" : (diff <= 0 ? "종료" : `D-${d}`);

                html += `<div class="d-day-container"><div class="label" style="color:var(--sub-text)">${item.label || item.title}</div><div class="timer" style="color:${item.color}">${diff>0?`${dDayText} <span class="timer-unit">${h}h ${m}m ${s}s</span>`:'종료'}</div></div>`;
            });
            resultContent.innerHTML = html;
        }

        function startTimer(type, i) { 
            document.getElementById('main-screen').style.display = 'none';
            const res = document.getElementById('result-screen'); res.style.display = 'flex';
            setTimeout(() => res.style.opacity = 1, 50);
            updateDisplay(type, i); timerInterval = setInterval(() => updateDisplay(type, i), 1000);
        }

        function stopTimer() { clearInterval(timerInterval); document.getElementById('result-screen').style.display = 'none'; document.getElementById('main-screen').style.display = 'flex'; }
        function deleteDDay(i) { if(confirm("삭제하시겠습니까?")) { const d = JSON.parse(localStorage.getItem('myDDays')); d.splice(i,1); localStorage.setItem('myDDays', JSON.stringify(d)); stopTimer(); renderButtons(); } }
        window.onload = () => { if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode'); renderButtons(); document.getElementById('quote-text').innerText = quotes[Math.floor(Math.random()*quotes.length)]; };
    </script>
</body>
</html>
