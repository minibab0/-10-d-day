<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>다정고 1학년 실시간 디데이</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --btn-bg: #1a1a1a;
            --btn-border: #333333;
            --sub-text: #666666;
            --quote-color: #aaaaaa;
            --accent-color: #007bff;
            --modal-bg: #111111;
        }

        body.light-mode {
            --bg-color: #ffffff;
            --text-color: #000000;
            --btn-bg: #f0f0f0;
            --btn-border: #cccccc;
            --sub-text: #888888;
            --quote-color: #555555;
            --accent-color: #0056b3;
            --modal-bg: #f5f5f5;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            transition: all 0.3s ease;
            overflow: hidden;
            touch-action: manipulation;
        }

        body.split-active .theme-toggle,
        body.split-active .add-btn,
        body.split-active .control-btns,
        body.split-active .ratio-section,
        body.split-active .info-text,
        body.split-active h1 {
            display: none !important;
        }

        body.split-active .timer {
            font-size: 2.5rem !important;
        }
        body.split-active .label {
            font-size: 1.2rem !important;
        }

        .theme-toggle { position: fixed; top: 20px; left: 20px; background: var(--btn-bg); color: var(--text-color); border: 1px solid var(--btn-border); padding: 8px 15px; border-radius: 20px; cursor: pointer; z-index: 100; }
        .add-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--accent-color); color: white; border: none; border-radius: 50%; font-size: 30px; cursor: pointer; z-index: 100; }

        #main-screen { display: flex; flex-direction: column; align-items: center; width: 100%; }
        h1 { font-size: 3.2rem; margin: 0 0 10px 0; font-weight: 800; }
        .info-text { color: var(--sub-text); font-size: 1rem; margin-bottom: 40px; }

        .button-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        button.nav-btn { background: var(--btn-bg); color: var(--text-color); border: 1px solid var(--btn-border); padding: 15px 30px; font-size: 1.1rem; border-radius: 15px; cursor: pointer; font-weight: 600; }

        #result-screen { display: none; flex-direction: column; align-items: center; width: 100%; opacity: 0; transition: opacity 0.5s ease; }
        .timer { font-size: 4.5rem; font-weight: 900; }
        .timer-unit { font-size: 0.5em; opacity: 0.8; margin-left: 5px; }

        .control-btns { display: flex; gap: 10px; margin-top: 20px; }
        .back-btn, .edit-btn, .del-btn, .ratio-btn { padding: 10px 20px; border-radius: 50px; cursor: pointer; border: 1px solid var(--btn-border); background: transparent; color: var(--sub-text); }
        
        .ratio-section { margin-top: 30px; border-top: 1px solid var(--btn-border); padding-top: 20px; width: 80%; max-width: 400px; }
        .pip-btn { width: 100%; padding: 15px; border-radius: 50px; background: #ff9f43; color: white; border: none; font-weight: 800; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }

        #modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
        #custom-modal { background: var(--modal-bg); padding: 30px; border-radius: 20px; width: 300px; display: flex; flex-direction: column; gap: 15px; }
        
        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 15px 25px; border-radius: 10px; display: none; z-index: 1000; pointer-events: none; }
    </style>
</head>
<body class="dark-mode" ondblclick="exitSplitMode()">

    <div id="toast">더블탭하면 원래 화면으로 돌아옵니다</div>
    <button class="theme-toggle" onclick="toggleTheme()">🌗 테마 전환</button>

    <div id="main-screen">
        <div id="quote-text" style="margin-bottom: 20px; color: var(--quote-color); font-style: italic;"></div>
        <h1>D-Day Tracker</h1>
        <p class="info-text">다정고등학교 2026년도 1학년 기준</p>
        <div class="button-container" id="btn-wrapper"></div>
    </div>

    <button class="add-btn" onclick="openModal(-1)">+</button>

    <div id="result-screen">
        <div id="result-content"></div>
        <div class="control-btns" id="extra-controls"></div>
        
        <div class="ratio-section">
            <p style="font-size: 0.8rem; color: var(--sub-text); margin-bottom: 10px;">분할창 비율 선택</p>
            <div style="display: flex; gap: 5px; justify-content: center; margin-bottom: 10px;">
                <button class="ratio-btn" onclick="setRatio(400, 200)">가로</button>
                <button class="ratio-btn" onclick="setRatio(300, 300)">정사각</button>
                <button class="ratio-btn" onclick="setRatio(200, 400)">세로</button>
            </div>
            <button class="pip-btn" onclick="enterSplitMode()">📺 분할모드 시작</button>
        </div>
        
        <div class="control-btns">
            <button class="back-btn" onclick="stopTimer()">뒤로 가기</button>
        </div>
    </div>

    <div id="modal-bg">
        <div id="custom-modal">
            <h3 style="margin:0">디데이 설정</h3>
            <input type="text" id="m-title" placeholder="제목" style="padding:10px; border-radius:5px; border:1px solid #333; background:#000; color:#fff;">
            <input type="date" id="m-date" style="padding:10px; border-radius:5px; border:1px solid #333; background:#000; color:#fff;">
            <select id="m-color" onchange="this.style.color = this.value" style="padding:10px; border-radius:5px; border:1px solid #333; background:#000;">
                <option value="#ff4d4d" style="color:#ff4d4d">빨강</option>
                <option value="#ff9f43" style="color:#ff9f43">주황</option>
                <option value="#feca57" style="color:#feca57">노랑</option>
                <option value="#1dd1a1" style="color:#1dd1a1">초록</option>
                <option value="#54a0ff" style="color:#54a0ff">파랑</option>
                <option value="#ffffff" style="color:#888">흰색</option>
            </select>
            <button onclick="saveCustomDDay()" style="padding:10px; background:var(--accent-color); color:white; border:none; border-radius:5px;">저장</button>
            <button onclick="closeModal()" style="padding:10px; background:#333; color:white; border:none; border-radius:5px;">취소</button>
        </div>
    </div>

    <script>
        const quotes = ["오늘 걷지 않으면 내일은 뛰어야 한다.", "할 수 있다고 믿는 사람은 결국 해낸다.", "꿈을 기록하는 것이 시작이다.", "노력은 결코 배신하지 않는다."];
        let timerInterval, editTargetIndex = -1;

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }

        function enterSplitMode() {
            document.body.classList.add('split-active');
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2500);
        }

        function exitSplitMode() {
            if (document.body.classList.contains('split-active')) {
                document.body.classList.remove('split-active');
            }
        }

        function openModal(index) {
            editTargetIndex = index;
            document.getElementById('modal-bg').style.display = 'flex';
            if (index !== -1) {
                const data = JSON.parse(localStorage.getItem('myDDays'))[index];
                document.getElementById('m-title').value = data.title;
                document.getElementById('m-date').value = data.date.split('T')[0];
                document.getElementById('m-color').value = data.color;
            }
        }

        function closeModal() { document.getElementById('modal-bg').style.display = 'none'; }

        function saveCustomDDay() {
            const title = document.getElementById('m-title').value;
            const date = document.getElementById('m-date').value;
            const color = document.getElementById('m-color').value;
            if (!title || !date) return alert("입력 정보를 확인해주세요.");
            const data = JSON.parse(localStorage.getItem('myDDays') || '[]');
            if (editTargetIndex === -1) data.push({ title, date: date + "T00:00:00", color });
            else data[editTargetIndex] = { title, date: date + "T00:00:00", color };
            localStorage.setItem('myDDays', JSON.stringify(data));
            closeModal(); renderButtons();
        }

        function renderButtons() {
            const wrapper = document.getElementById('btn-wrapper');
            wrapper.innerHTML = `<button class="nav-btn" onclick="startTimer('exam')">시험</button><button class="nav-btn" onclick="startTimer('vacation')">방학</button>`;
            JSON.parse(localStorage.getItem('myDDays') || '[]').forEach((item, i) => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn'; btn.innerText = item.title; btn.style.color = item.color; btn.style.borderColor = item.color;
                btn.onclick = () => startTimer('custom', i);
                wrapper.appendChild(btn);
            });
        }

        function updateDisplay(type, index) {
            const resultContent = document.getElementById('result-content');
            const controlArea = document.getElementById('extra-controls');
            const now = new Date();
            let targets = (type === 'custom') ? [JSON.parse(localStorage.getItem('myDDays'))[index]] : {exam:[{label:'중간고사',date:'2026-04-23T00:00:00',color:'#ff5252'}],vacation:[{label:'여름방학',date:'2026-07-20T00:00:00',color:'#4dabf7'}]}[type];

            if(type === 'custom') controlArea.innerHTML = `<button class="edit-btn" onclick="openModal(${index})">수정</button><button class="del-btn" onclick="deleteDDay(${index})">삭제</button>`;
            else controlArea.innerHTML = "";

            let html = '';
            targets.forEach(item => {
                const targetDate = new Date(item.date);
                const diff = targetDate - now;
                
                // 일수 계산 (당일 로직 포함)
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff/3600000)%24);
                const m = Math.floor((diff/60000)%60);
                const s = Math.floor((diff/1000)%60);

                let dDayText = `D-${d}`;
                if (diff <= 0) {
                    dDayText = "종료";
                } else if (d === 0) {
                    dDayText = "D-Day";
                }

                html += `
                    <div class="d-day-container">
                        <div class="label" style="color:var(--sub-text)">${item.label || item.title}</div>
                        <div class="timer" style="color:${item.color}">
                            ${diff > 0 ? `${dDayText} <span class="timer-unit">${h}h ${m}m ${s}s</span>` : '종료'}
                        </div>
                    </div>`;
            });
            resultContent.innerHTML = html;
        }

        function startTimer(type, i) { 
            document.getElementById('main-screen').style.display = 'none';
            const res = document.getElementById('result-screen'); res.style.display = 'flex';
            setTimeout(() => res.style.opacity = 1, 50);
            updateDisplay(type, i); timerInterval = setInterval(() => updateDisplay(type, i), 1000);
        }

        function stopTimer() { clearInterval(timerInterval); document.getElementById('result-screen').style.display = 'none'; document.getElementById('main-screen').style.display = 'flex'; }
        
        function deleteDDay(i) { if(confirm("삭제할까요?")) { const d = JSON.parse(localStorage.getItem('myDDays')); d.splice(i,1); localStorage.setItem('myDDays', JSON.stringify(d)); stopTimer(); renderButtons(); } }

        window.onload = () => { renderButtons(); document.getElementById('quote-text').innerText = quotes[Math.floor(Math.random()*quotes.length)]; };
    </script>
</body>
</html>
