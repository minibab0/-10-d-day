<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다정고 1학년 실시간 디데이</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }

        #main-screen { 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            width: 100%;
        }

        /* 명언 박스: 타이틀 위쪽에 배치 */
        #quote-container {
            margin-bottom: 20px;
            padding: 10px 20px;
            max-width: 85%;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #quote-text {
            font-size: 1.15rem;
            font-style: italic;
            color: #aaaaaa;
            line-height: 1.5;
            word-break: keep-all;
        }

        h1 { font-size: 3.5rem; margin: 0 0 10px 0; letter-spacing: -1.5px; font-weight: 800; }
        .info-text { color: #666; font-size: 1rem; margin-bottom: 50px; }

        .button-container { display: flex; gap: 20px; }

        button {
            background-color: #1a1a1a;
            color: #eee;
            border: 1px solid #333;
            padding: 18px 40px;
            font-size: 1.3rem;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
        }

        button:hover {
            background-color: #ffffff;
            color: #000000;
            transform: scale(1.05);
        }

        /* 결과 화면 스타일 */
        #result-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .d-day-container { margin: 30px 0; width: 100%; }
        .label { font-size: 1.6rem; color: #cccccc; margin-bottom: 15px; font-weight: 500; }
        
        .timer {
            font-size: 4.8rem; 
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.15);
            line-height: 1.2;
        }

        .timer-unit {
            font-size: 0.45em; 
            opacity: 0.8; 
            margin-left: 10px;
            font-weight: 400;
        }

        .notice { font-size: 0.95rem; color: #555; margin-top: 25px; }

        .back-btn {
            margin-top: 50px;
            padding: 12px 35px;
            font-size: 1.1rem;
            border-radius: 50px;
            border: 2px solid #444;
            background: transparent;
            color: #888;
            cursor: pointer;
            transition: 0.3s;
        }
        .back-btn:hover {
            border-color: #eee;
            color: #eee;
        }
    </style>
</head>
<body>

    <div id="main-screen">
        <div id="quote-container">
            <div id="quote-text">명언을 불러오는 중...</div>
        </div>
        
        <h1>D-Day Tracker</h1>
        <p class="info-text">다정고등학교 2026년도 1학년(2010년생) 기준</p>

        <div class="button-container">
            <button onclick="startTimer('exam')">시험</button>
            <button onclick="startTimer('vacation')">방학</button>
            <button onclick="startTimer('suneung')">수능</button>
        </div>
    </div>

    <div id="result-screen">
        <div id="result-content"></div>
        <button class="back-btn" onclick="stopTimer()">뒤로 가기</button>
    </div>

    <script>

            "꿈을 기록하는 것이 시작이다.", "내일의 나를 만드는 것은 오늘의 나다.", "실패는 성공을 향한 과정일 뿐이다.",
            "지루한 반복이 천재를 만든다.", "공부할 때의 고통은 잠깐이지만 못 배운 고통은 평생이다.", "지금 잠을 자면 꿈을 꾸지만 지금 공부하면 꿈을 이룬다.",
            "성공은 대개 그를 찾느라 너무 바쁜 사람에게 온다.", "행동은 모든 성공의 기초 열쇠다.", "기회는 준비된 자에게만 온다.",
            "뿌린 대로 거두는 법이다.", "인생에서 가장 큰 영광은 넘어지지 않는 것이 아니라 넘어질 때마다 일어서는 것이다.",
            "한계를 정하는 순간 그게 바로 너의 한계가 된다.", "천재는 1%의 영감과 99%의 노력으로 만들어진다.", "너 자신을 믿어라.",
            "오늘의 고통이 내일의 기쁨이 된다.", "시간은 기다려주지 않는다.", "집중력이 곧 실력이다.", "포기는 선택지에 없다.",
            "끝날 때까지 끝난 게 아니다.", "비교할 대상은 남이 아니라 어제의 나다.", "모든 성취의 시작점은 갈망이다.",
            "멈추지 않는다면 얼마나 천천히 가는지는 중요하지 않다.", "열정 없이 이루어진 위대한 일은 없다.", "습관이 운명을 만든다.",
            "최고가 되기 위해 최선을 다하라.", "어려운 일일수록 더 큰 가치가 있다.", "당신이 할 수 있다고 생각하든 할 수 없다고 생각하든 당신이 옳다.",
            "가장 빛나는 별은 가장 어두운 밤에 보인다.", "한 번도 가져보지 못한 것을 갖고 싶다면 한 번도 해보지 않은 노력을 해야 한다.",
            "성공의 비결은 시작하는 것이다.", "꿈이 있다면 행동하라.", "성공은 매일 반복되는 작은 노력들의 합계다.",
            "남보다 더 많이 공부하고 남보다 더 많이 노력하라.", "불가능해 보이는 것도 시작하면 가능해진다.", "자신의 운명은 자신이 결정한다.",
            "최선이란 말은 내 자신의 노력이 나를 감동시킬 수 있을 때 쓰는 말이다.", "결과로 과정의 가치를 증명하라.",
            "남들이 쉬고 있을 때 한 걸음 더 나아가라.", "고통 없이는 얻는 것도 없다.", "미래는 현재 우리가 무엇을 하는가에 달려 있다.",
            "변화는 내면에서부터 시작된다.", "자신감은 성공의 첫 번째 비결이다.", "계획 없는 목표는 단지 희망사항일 뿐이다.",
            "지금 이 순간은 다시 오지 않는다.", "기적을 기다리지 말고 기적을 만들어라.", "배움에는 끝이 없다.",
            "모든 일의 시작은 위험하지만 아무것도 하지 않는 것이 더 위험하다.", "성공은 당신이 얼마나 높이 올라갔느냐가 아니라 어떻게 차이를 만드느냐이다.",
            "가장 늦었다고 생각할 때가 가장 빠른 때다.", "실패를 두려워하지 말고 도전을 즐겨라.", "당신의 인생은 당신의 생각대로 된다.",
            "인생에서 가장 중요한 것은 나 자신을 찾는 것이다.", "매일 매일이 새로운 기회다.", "꿈을 크게 가져라, 깨져도 그 조각은 크다.",
            "지식은 힘이다.", "도전이 없으면 성취도 없다.", "오늘 할 일을 내일로 미루지 마라.", "가장 위대한 승리는 자기 자신을 이기는 것이다.",

            "생각하는 대로 살지 않으면 사는 대로 생각하게 된다.", "인생은 짧고 공부는 길다.", "꾸준함이 모든 것을 이긴다.",
            "자신을 사랑하는 것이 모든 성공의 시작이다.", "할 수 있다, 하면 된다, 해보자.", "기회는 노크하지 않는다, 문을 만들어라.",
            "성공하기까지는 항상 불가능해 보인다.", "당신의 열정이 곧 당신의 결정이다.", "가장 큰 실수 중 하나는 실수를 두려워하는 것이다.",
            "무엇이든 시작하기에 가장 좋은 시간은 바로 지금이다.", "세상을 바꾸고 싶다면 너 자신부터 바꿔라.", "용기는 두려움이 없는 것이 아니라 두려움에 맞서는 것이다.",
            "성공의 사다리는 위쪽이 붐비지 않는다.", "지름길은 없다, 오직 정직한 노력뿐이다.", "너는 네가 생각하는 것보다 훨씬 더 똑똑하다.",
            "공부는 미래를 향한 가장 확실한 투자다.", "꿈을 꾸는 사람이 세상을 움직인다.", "성공은 열정을 잃지 않고 실패에서 실패로 가는 능력이다.",
            "아무것도 하지 않으면 아무 일도 일어나지 않는다.", "오늘의 땀방울이 내일의 보석이 된다.", "나의 경쟁 상대는 어제의 나다.",
            "자신의 한계를 시험하라.", "성공의 문을 여는 열쇠는 끈기다.", "노력하는 사람에게 불가능은 없다.", "가장 큰 자산은 너 자신이다.",
            "오늘의 선택이 너의 미래를 결정한다.", "멈추지 마라, 너는 잘하고 있다.", "할 수 있다는 믿음이 절반의 성공이다.", "네 인생의 주인공은 너다.", "후회 없는 오늘을 살아라."
        ];

        function setRandomQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            document.getElementById('quote-text').innerText = `오늘의 명언: "${quotes[randomIndex]}"`;
        }

        window.onload = setRandomQuote;

        let timerInterval;

        function updateDisplay(type) {
            const resultContent = document.getElementById('result-content');
            const now = new Date();
            let html = '';

            // 대한민국 자정(00:00:00) 기준 설정 [cite: 2026-04-13]
            const targets = {
                exam: [{ label: '중간고사', date: '2026-04-23T00:00:00', color: '#ff5252' }],
                vacation: [
                    { label: '여름방학', date: '2026-07-20T00:00:00', color: '#4dabf7' },
                    { label: '겨울방학', date: '2027-01-29T00:00:00', color: '#4dabf7' }
                ],
                suneung: [{ label: '2029 수능(예정)', date: '2028-11-01T00:00:00', color: '#ffcc00' }]
            };

            targets[type].forEach(item => {
                const target = new Date(item.date);
                const diff = target - now;

                if (diff <= 0) {
                    html += `<div class="d-day-container"><div class="label">${item.label}</div><div class="timer" style="color:${item.color}">D-Day 종료</div></div>`;
                } else {
                    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
                    const m = Math.floor((diff / (1000 * 60)) % 60);
                    const s = Math.floor((diff / 1000) % 60);

                    html += `
                        <div class="d-day-container">
                            <div class="label">${item.label} (${item.date.split('T')[0]})</div>
                            <div class="timer" style="color:${item.color}">
                                D-${d} <span class="timer-unit">${h}h ${m}m ${s}s</span>
                            </div>
                        </div>
                    `;
                }
            });

            if (type === 'suneung') {
                html += `<p class="notice">* 아직 정확한 수능일이 발표되지 않아 11월 1일 기준으로 설정되었습니다.</p>`;
            }

            resultContent.innerHTML = html;
        }

        function startTimer(type) {
            document.getElementById('main-screen').style.display = 'none';
            const resScreen = document.getElementById('result-screen');
            resScreen.style.display = 'flex';
            setTimeout(() => { resScreen.style.opacity = 1; }, 50);
            updateDisplay(type);
            timerInterval = setInterval(() => updateDisplay(type), 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            setRandomQuote(); 
            const mainScreen = document.getElementById('main-screen');
            const resultScreen = document.getElementById('result-screen');

            resultScreen.style.opacity = 0;
            setTimeout(() => {
                resultScreen.style.display = 'none';
                mainScreen.style.display = 'flex';
                mainScreen.style.flexDirection = 'column';
                mainScreen.style.alignItems = 'center';
            }, 300);
        }
    </script>
</body>
</html>
