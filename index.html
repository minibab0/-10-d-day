<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>다정고 실시간 디데이 v0.25</title>
    <style>
        :root {
            --bg-color: #000000; --text-color: #ffffff; --btn-bg: #1a1a1a; --btn-border: #333333;
            --sub-text: #666666; --quote-color: #aaaaaa; --accent-color: #007bff; --modal-bg: #111111;
        }
        body.light-mode {
            --bg-color: #ffffff; --text-color: #000000; --btn-bg: #f0f0f0; --btn-border: #cccccc;
            --sub-text: #888888; --quote-color: #555555; --accent-color: #0056b3; --modal-bg: #f5f5f5;
        }
        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "맑은 고딕", helvetica, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; text-align: center; transition: background 0.3s; overflow: hidden;
        }
        
        #main-clock {
            font-size: 1.5rem; font-weight: 700; margin-top: -30px; margin-bottom: 15px;
            letter-spacing: 1px; font-variant-numeric: tabular-nums;
        }

        #quote-text { margin-bottom: 25px; color: var(--quote-color); font-style: italic; font-size: 0.95rem; max-width: 85%; line-height: 1.5; word-break: keep-all; min-height: 3.5em; display: flex; align-items: center; justify-content: center; }
        
        h1 { font-size: 2.3rem; margin: 0 0 5px 0; font-weight: 800; }
        .info-text { color: var(--sub-text); font-size: 0.85rem; margin-bottom: 35px; }
        
        .button-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .nav-btn { background: var(--btn-bg); color: var(--text-color); border: 1px solid var(--btn-border); padding: 14px 28px; font-size: 1rem; border-radius: 14px; cursor: pointer; font-weight: 700; transition: 0.2s; }
        
        .top-btns { position: fixed; top: 15px; left: 15px; z-index: 100; }
        .mini-btn { background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--text-color); padding: 6px 12px; border-radius: 10px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }

        #result-screen { display: none; flex-direction: column; align-items: center; width: 100%; }
        .timer { font-size: 4.8rem; font-weight: 900; margin: 15px 0; letter-spacing: -1px; }
        .timer-unit { font-size: 0.35em; opacity: 0.8; margin-left: 5px; font-weight: 700; }
        .label { font-size: 1.8rem; margin-bottom: 10px; font-weight: 600; color: var(--sub-text); }

        .add-btn { position: fixed; bottom: 25px; right: 25px; width: 50px; height: 50px; background: var(--accent-color); color: white; border: none; border-radius: 50%; font-size: 28px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        #modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        #custom-modal { background: var(--modal-bg); padding: 30px; border-radius: 20px; width: 280px; display: flex; flex-direction: column; gap: 15px; border: 1px solid var(--btn-border); }
        input, select { padding: 12px; background: #000; color: #fff; border: 1px solid #333; border-radius: 10px; font-size: 1rem; }
        body.light-mode input, body.light-mode select { background: #fff; color: #000; border: 1px solid #ccc; }
    </style>
</head>
<body class="dark-mode">

    <div class="top-btns">
        <button class="mini-btn" onclick="toggleTheme()">🌗 테마 전환</button>
    </div>

    <div id="main-screen">
        <div id="main-clock">00:00:00</div>
        <div id="quote-text">명언을 불러오는 중...</div>
        <h1>D-Day Tracker</h1>
        <p class="info-text">다정고등학교 2026</p>
        <div class="button-container" id="btn-wrapper"></div>
    </div>

    <button class="add-btn" onclick="openModal()">+</button>

    <div id="result-screen">
        <div id="result-content"></div>
        <div id="control-area" style="margin-top:20px; display:flex; gap:10px;"></div>
        <button class="mini-btn" style="margin-top:40px; padding: 14px 30px; font-size: 1rem; background: var(--accent-color); color: white; border:none;" onclick="stopTimer()">뒤로 가기</button>
    </div>

    <div id="modal-bg">
        <div id="custom-modal">

            <input type="text" id="m-title" placeholder="제목 (예: 수학수행)">
            <input type="date" id="m-date">
            <select id="m-color">
                <option value="#ff4d4d">빨강</option>
                <option value="#ff9f43">주황</option>
                <option value="#feca57">노랑</option>
                <option value="#1dd1a1">초록</option>
                <option value="#54a0ff">파랑</option>
                <option value="#ffffff">흰색</option>
            </select>
            <button onclick="saveDDay()" style="padding:12px; background:var(--accent-color); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">저장</button>
            <button onclick="closeModal()" style="background:none; border:none; color:var(--sub-text); cursor:pointer;">취소</button>
        </div>
    </div>

        while(quotes.length < 400) { quotes.push(quotes[quotes.length % 50] + "!"); }

        let timerInterval;

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('main-clock').innerText = 
                now.getHours().toString().padStart(2, '0') + ":" + 
                now.getMinutes().toString().padStart(2, '0') + ":" + 
                now.getSeconds().toString().padStart(2, '0');
        }

        function renderButtons() {
            const wrapper = document.getElementById('btn-wrapper');
            wrapper.innerHTML = `
                <button class="nav-btn" onclick="startTimer('exam')">시험</button>
                <button class="nav-btn" onclick="startTimer('vacation')">방학</button>
            `;
            const customData = JSON.parse(localStorage.getItem('myDDays') || '[]');
            customData.forEach((item, i) => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.innerText = item.title;
                btn.style.color = item.color;
                btn.style.borderColor = item.color;
                btn.onclick = () => startTimer('custom', i);
                wrapper.appendChild(btn);
            });
        }

        function startTimer(type, index) {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
            updateDisplay(type, index);
            timerInterval = setInterval(() => updateDisplay(type, index), 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'flex';
        }

        function updateDisplay(type, index) {
            const container = document.getElementById('result-content');
            const ctrl = document.getElementById('control-area');
            const now = new Date();
            let target;

            if(type === 'exam') { target = {label: '중간고사', date: '2026-04-23T00:00:00', color: '#ff5252'}; ctrl.innerHTML = ''; }
            else if(type === 'vacation') { target = {label: '여름방학', date: '2026-07-20T00:00:00', color: '#4dabf7'}; ctrl.innerHTML = ''; }
            else { 
                target = JSON.parse(localStorage.getItem('myDDays'))[index];
                ctrl.innerHTML = `<button class="mini-btn" onclick="deleteDDay(${index})" style="background:#ff4d4d; border:none; color:white;">삭제</button>`;
            }

            const diff = new Date(target.date) - now;
            const d = Math.floor(diff / 86400000);
            const h = String(Math.floor((diff / 3600000) % 24)).padStart(2, '0');
            const m = String(Math.floor((diff / 60000) % 60)).padStart(2, '0');
            const s = String(Math.floor((diff / 1000) % 60)).padStart(2, '0');

            container.innerHTML = `
                <div class="label">${target.label || target.title}</div>
                <div class="timer" style="color:${target.color}">
                    ${diff > 0 ? `D-${d} <span class="timer-unit">${h}:${m}:${s}</span>` : '종료'}
                </div>
            `;
        }

        function openModal() { document.getElementById('modal-bg').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-bg').style.display = 'none'; }

        function saveDDay() {
            const title = document.getElementById('m-title').value;
            const date = document.getElementById('m-date').value;
            const color = document.getElementById('m-color').value;
            if(!title || !date) return alert("내용을 입력해주세요!");
            const data = JSON.parse(localStorage.getItem('myDDays') || '[]');
            data.push({title, date: date + "T00:00:00", color});
            localStorage.setItem('myDDays', JSON.stringify(data));
            closeModal(); renderButtons();
        }

        function deleteDDay(i) {
            if(confirm("이 디데이를 삭제할까요?")) {
                const data = JSON.parse(localStorage.getItem('myDDays'));
                data.splice(i, 1);
                localStorage.setItem('myDDays', JSON.stringify(data));
                stopTimer(); renderButtons();
            }
        }

        window.onload = () => {
            if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
            document.getElementById('quote-text').innerText = quotes[Math.floor(Math.random() * quotes.length)];
            renderButtons();
            setInterval(updateClock, 1000);
            updateClock();
        };
    </script>

</body>
</html>
